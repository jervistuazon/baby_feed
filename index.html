<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7dce8">
  <title>Anya Baby Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Newborn care checklist</p>
        <h1>Anya Baby Tracker</h1>
      </div>
      <button id="darkModeToggle" class="icon-button" type="button" aria-pressed="false">🌙</button>
    </header>

    <section class="sticky-panel" aria-label="Daily controls and summary">
      <div class="date-card">
        <button id="previousDay" class="day-button" type="button">← Previous</button>
        <div class="date-display" aria-live="polite">
          <span class="date-label">Selected date</span>
          <strong id="selectedDateText"></strong>
        </div>
        <button id="nextDay" class="day-button" type="button">Next →</button>
      </div>

      <div class="quick-actions">
        <button id="todayButton" class="secondary-button" type="button">Today</button>
        <button id="exportCsv" class="secondary-button" type="button">Export CSV</button>
        <button id="backupJson" class="secondary-button" type="button">Backup JSON</button>
        <button id="clearDay" class="danger-button" type="button">Clear Day</button>
      </div>

      <div class="summary-grid" aria-label="Daily summary">
        <div class="summary-item milk-summary">
          <span id="milkTotal">0</span>
          <small>Milk</small>
        </div>
        <div class="summary-item pee-summary">
          <span id="peeTotal">0</span>
          <small>Pee</small>
        </div>
        <div class="summary-item poop-summary">
          <span id="poopTotal">0</span>
          <small>Poop</small>
        </div>
      </div>

      <p id="feedingGapNotice" class="gap-notice" hidden></p>
    </section>

    <main>
      <div class="grid-heading" aria-hidden="true">
        <span>Time</span>
        <span>Milk</span>
        <span>Pee</span>
        <span>Poop</span>
        <span>Notes</span>
      </div>
      <div id="trackerGrid" class="tracker-grid" aria-label="30 minute baby care tracker"></div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
