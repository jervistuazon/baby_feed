<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7dce8">
  <title>Anya Baby Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Newborn care checklist</p>
        <h1>Anya Baby Tracker</h1>
      </div>
      <button id="darkModeToggle" class="icon-button" type="button" aria-pressed="false">🌙</button>
    </header>

    <section class="sticky-panel" aria-label="Daily controls and summary">
      <div class="date-card">
        <button id="previousDay" class="day-button" type="button">← Previous</button>
        <div class="date-display" aria-live="polite">
          <span class="date-label">Selected date</span>
          <strong id="selectedDateText"></strong>
        </div>
        <button id="nextDay" class="day-button" type="button">Next →</button>
      </div>

      <div class="quick-actions">
        <button id="todayButton" class="secondary-button" type="button">Today</button>
        <button id="exportCsv" class="secondary-button" type="button">Export CSV</button>
        <button id="backupJson" class="secondary-button" type="button">Backup JSON</button>
        <button id="clearDay" class="danger-button" type="button">Clear Day</button>
      </div>

      <div class="summary-grid" aria-label="Daily summary">
        <div class="summary-item milk-summary">
          <span id="milkTotal">0</span>
          <small>Milk</small>
        </div>
        <div class="summary-item pee-summary">
          <span id="peeTotal">0</span>
          <small>Pee</small>
        </div>
        <div class="summary-item poop-summary">
          <span id="poopTotal">0</span>
          <small>Poop</small>
        </div>
      </div>

      <p id="feedingGapNotice" class="gap-notice" hidden></p>
    </section>

    <main>
      <div class="timeline-intro">
        <div>
          <p class="eyebrow">Visual day grid</p>
          <h2>Tap a time block</h2>
        </div>
        <div class="legend" aria-label="Activity legend">
          <span><strong>🍼</strong> Feed</span>
          <span><strong>💧</strong> Pee</span>
          <span><strong>💩</strong> Poop</span>
        </div>
      </div>
      <div id="trackerGrid" class="tracker-grid" aria-label="30 minute baby care tracker"></div>
    </main>
  </div>

  <div id="activityModal" class="modal-backdrop" hidden>
    <section class="activity-modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <div>
          <span class="date-label">Choose entry</span>
          <h2 id="modalTitle">12:30 PM</h2>
        </div>
        <button id="closeModal" class="close-button" type="button" aria-label="Close popup">×</button>
      </div>

      <div class="activity-options" aria-label="Activity choices">
        <button class="activity-choice milk-choice" type="button" data-type="milk" aria-pressed="false">
          <span class="activity-icon">🍼</span>
          <span>Feed</span>
        </button>
        <button class="activity-choice pee-choice" type="button" data-type="pee" aria-pressed="false">
          <span class="activity-icon">💧</span>
          <span>Pee</span>
        </button>
        <button class="activity-choice poop-choice" type="button" data-type="poop" aria-pressed="false">
          <span class="activity-icon">💩</span>
          <span>Poop</span>
        </button>
      </div>

      <label class="notes-label" for="modalNotes">Optional note</label>
      <input id="modalNotes" class="notes-input" type="text" maxlength="80" placeholder="Short note">
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
