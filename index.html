<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fff7f8">
  <title>Anya Baby Tracker</title>
  <link rel="stylesheet" href="style.css?v=2026.06.14.18">
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="icon-heart" viewBox="0 0 24 24">
      <path d="M12 21s-7.6-4.5-9.5-9.5C1 7.4 3.4 4 7.3 4c2 0 3.5 1 4.7 2.6C13.2 5 14.8 4 16.7 4c3.9 0 6.3 3.4 4.8 7.5C19.6 16.5 12 21 12 21Z" />
      <path d="M16.6 7.3c1.2.2 2 .9 2.3 2.1" fill="none" />
    </symbol>
    <symbol id="icon-gear" viewBox="0 0 24 24">
      <path d="M9.7 3.4h4.6l.5 2.1c.5.2 1 .4 1.5.6l1.9-1.1 2.3 4-1.7 1.4c.1.5.1 1 .1 1.5s0 1-.1 1.5l1.7 1.4-2.3 4-1.9-1.1c-.5.3-1 .5-1.5.6l-.5 2.1H9.7l-.5-2.1c-.5-.2-1-.4-1.5-.6l-1.9 1.1-2.3-4 1.7-1.4c-.1-.5-.1-1-.1-1.5s0-1 .1-1.5L3.5 9l2.3-4 1.9 1.1c.5-.3 1-.5 1.5-.6l.5-2.1Z" />
      <circle cx="12" cy="12" r="3.1" />
    </symbol>
    <symbol id="icon-bottle" viewBox="0 0 24 24">
      <path d="M10 3h4" />
      <path d="M9.5 6h5" />
      <path d="M10 6v3.4l-1.8 2.1a4 4 0 0 0-1 2.7V19a2 2 0 0 0 2 2h5.6a2 2 0 0 0 2-2v-4.8a4 4 0 0 0-1-2.7L14 9.4V6" />
      <path d="M9.4 14h5.2" />
      <path d="M9.4 17h5.2" />
    </symbol>
    <symbol id="icon-drop" viewBox="0 0 24 24">
      <path d="M12 3.8s6.2 6.8 6.2 11a6.2 6.2 0 0 1-12.4 0c0-4.2 6.2-11 6.2-11Z" />
      <path d="M9.5 15.3a2.7 2.7 0 0 0 2.7 2.7" />
    </symbol>
    <symbol id="icon-diaper" viewBox="0 0 24 24">
      <path d="M4.8 6.5h14.4v6.2A6.7 6.7 0 0 1 12.5 19h-1a6.7 6.7 0 0 1-6.7-6.3V6.5Z" />
      <path d="M4.8 9.5c2.2.4 3.9 1.8 4.8 3.8" />
      <path d="M19.2 9.5c-2.2.4-3.9 1.8-4.8 3.8" />
      <path d="M10.2 15.2h3.6" />
    </symbol>
    <symbol id="icon-note" viewBox="0 0 24 24">
      <path d="M6 4.5h12A1.5 1.5 0 0 1 19.5 6v8.4a1.5 1.5 0 0 1-1.5 1.5h-5.5L8 19.5v-3.6H6a1.5 1.5 0 0 1-1.5-1.5V6A1.5 1.5 0 0 1 6 4.5Z" />
      <path d="M8.2 8.5h7.6" />
      <path d="M8.2 11.5h5" />
    </symbol>
    <symbol id="icon-file" viewBox="0 0 24 24">
      <path d="M7 3.8h6.3L18 8.5v11.7H7V3.8Z" />
      <path d="M13 3.8v5h5" />
      <path d="M9.6 13h4.8" />
      <path d="M9.6 16h4.8" />
    </symbol>
    <symbol id="icon-save" viewBox="0 0 24 24">
      <path d="M5 4h12.2L20 6.8V20H5V4Z" />
      <path d="M8 4v5h7V4" />
      <path d="M8.2 15.5h7.6V20H8.2v-4.5Z" />
    </symbol>
    <symbol id="icon-import" viewBox="0 0 24 24">
      <path d="M12 3.8v10" />
      <path d="m8.2 10.2 3.8 3.7 3.8-3.7" />
      <path d="M5 15v4.2h14V15" />
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24">
      <path d="M5 7h14" />
      <path d="M9 7V4.8h6V7" />
      <path d="M7.2 7.2 8 20h8l.8-12.8" />
      <path d="M10.2 11v5" />
      <path d="M13.8 11v5" />
    </symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24">
      <path d="M12 5v14" />
      <path d="M5 12h14" />
    </symbol>
    <symbol id="icon-clock" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="8.5" />
      <path d="M12 7.2v5l3.4 2.1" />
    </symbol>
    <symbol id="icon-calendar" viewBox="0 0 24 24">
      <path d="M6.5 4.5v3" />
      <path d="M17.5 4.5v3" />
      <path d="M4.8 8.5h14.4" />
      <path d="M6.5 6h11A1.8 1.8 0 0 1 19.3 7.8v10A1.8 1.8 0 0 1 17.5 19.6h-11a1.8 1.8 0 0 1-1.8-1.8v-10A1.8 1.8 0 0 1 6.5 6Z" />
      <path d="M8.2 12h.1" />
      <path d="M12 12h.1" />
      <path d="M15.8 12h.1" />
      <path d="M8.2 15.3h.1" />
      <path d="M12 15.3h.1" />
    </symbol>
    <symbol id="icon-chevron" viewBox="0 0 24 24">
      <path d="m9 5 7 7-7 7" />
    </symbol>
  </svg>
  <div class="app-shell">
    <header class="app-header">
      <h1><span class="heart-icon" aria-hidden="true"><svg class="app-icon"><use href="#icon-heart"></use></svg></span> Anya</h1>
      <div class="header-actions">
        <button id="settingsButton" class="settings-trigger" type="button" aria-expanded="false" aria-controls="settingsMenu" aria-label="Open settings">
          <svg class="app-icon" aria-hidden="true"><use href="#icon-gear"></use></svg>
        </button>
        <div id="settingsMenu" class="settings-menu" hidden>
          <div class="settings-menu-header">
            <strong>Settings</strong>
            <span>Baby Tracker</span>
          </div>
          <button id="exportCsv" class="settings-menu-item" type="button">
            <span aria-hidden="true"><svg class="menu-icon"><use href="#icon-file"></use></svg></span>
            <span>
              <strong>Export selected day</strong>
              <small>CSV for the day on screen</small>
            </span>
          </button>
          <button id="backupJson" class="settings-menu-item" type="button">
            <span aria-hidden="true"><svg class="menu-icon"><use href="#icon-save"></use></svg></span>
            <span>
              <strong>Backup all saved days</strong>
              <small>JSON copy for safekeeping</small>
            </span>
          </button>
          <button id="importJson" class="settings-menu-item" type="button">
            <span aria-hidden="true"><svg class="menu-icon"><use href="#icon-import"></use></svg></span>
            <span>
              <strong>Import saved days</strong>
              <small>Restore from a JSON backup</small>
            </span>
          </button>
          <button id="clearDay" class="settings-menu-item danger-menu-item" type="button">
            <span aria-hidden="true"><svg class="menu-icon"><use href="#icon-trash"></use></svg></span>
            <span>
              <strong>Clear selected day</strong>
              <small>Remove entries for this date</small>
            </span>
          </button>
          <input id="importJsonInput" type="file" accept="application/json,.json" hidden>
        </div>
      </div>
    </header>

    <section class="daily-panel" aria-label="Daily controls and summary">
      <div class="date-card">
        <button id="previousDay" class="day-button" type="button"><span aria-hidden="true">&lsaquo;</span> Prev</button>
        <button id="todayButton" class="day-button today-button" type="button"><span id="selectedDateText">Today</span></button>
        <button id="nextDay" class="day-button" type="button">Next <span aria-hidden="true">&rsaquo;</span></button>
      </div>

      <div class="summary-card" aria-label="Daily summary">
        <div class="summary-item milk-summary">
          <span class="summary-icon" aria-hidden="true"><svg class="icon-glyph"><use href="#icon-bottle"></use></svg></span>
          <div>
            <small>Milk</small>
            <span id="milkTotal">0 ml</span>
            <small id="milkAverage" class="summary-meta">0 feeds &bull; avg --</small>
          </div>
        </div>
        <div class="summary-item pee-summary">
          <span class="summary-icon" aria-hidden="true"><svg class="icon-glyph"><use href="#icon-drop"></use></svg></span>
          <div>
            <small>Pee</small>
            <span id="peeTotal">0</span>
          </div>
        </div>
        <div class="summary-item poop-summary">
          <span class="summary-icon" aria-hidden="true"><svg class="icon-glyph"><use href="#icon-diaper"></use></svg></span>
          <div>
            <small>Poop</small>
            <span id="poopTotal">0</span>
          </div>
        </div>
        <div class="summary-item notes-summary">
          <span class="summary-icon" aria-hidden="true"><svg class="icon-glyph"><use href="#icon-note"></use></svg></span>
          <div>
            <small>Notes</small>
            <span id="notesTotal">0</span>
          </div>
        </div>
      </div>

      <div id="feedStatusCard" class="feed-status-card" aria-live="polite">
        <div class="feed-status-detail">
          <span class="feed-status-icon" aria-hidden="true"><svg class="icon-glyph"><use href="#icon-clock"></use></svg></span>
          <div>
            <small>Last feed</small>
            <strong id="lastMilkTime">--</strong>
          </div>
        </div>
        <div class="feed-status-detail">
          <span class="feed-status-icon" aria-hidden="true"><svg class="icon-glyph"><use href="#icon-calendar"></use></svg></span>
          <div>
            <small>Next feed</small>
            <strong id="nextFeedTime">--</strong>
          </div>
        </div>
      </div>
    </section>

    <main>
      <div class="timeline-toolbar">
        <span class="timeline-toolbar-icon" aria-hidden="true"><svg class="icon-glyph"><use href="#icon-file"></use></svg></span>
        <strong>Entries for the day</strong>
      </div>
      <div id="trackerGrid" class="tracker-timeline" aria-label="Daily baby care timeline"></div>
    </main>
  </div>

  <button id="addEntryButton" class="add-entry-button floating-add-entry" type="button" aria-label="Add entry at the current time">
    <svg class="app-icon" aria-hidden="true"><use href="#icon-plus"></use></svg>
    <span>Add entry</span>
  </button>

  <div id="activityModal" class="modal-backdrop" hidden>
    <section class="activity-modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <div>
          <span id="modalDateLabel" class="date-label">Choose entry</span>
          <h2 id="modalTitle">12:30 PM</h2>
        </div>
        <button id="closeModal" class="close-button" type="button" aria-label="Close popup">&times;</button>
      </div>

      <div class="activity-options" aria-label="Activity choices">
        <button class="activity-choice milk-choice" type="button" data-type="milk" aria-pressed="false">
          <span class="activity-icon"><svg class="icon-glyph" aria-hidden="true"><use href="#icon-bottle"></use></svg></span>
          <span>Milk</span>
        </button>
        <button class="activity-choice pee-choice" type="button" data-type="pee" aria-pressed="false">
          <span class="activity-icon"><svg class="icon-glyph" aria-hidden="true"><use href="#icon-drop"></use></svg></span>
          <span>Pee</span>
        </button>
        <button class="activity-choice poop-choice" type="button" data-type="poop" aria-pressed="false">
          <span class="activity-icon"><svg class="icon-glyph" aria-hidden="true"><use href="#icon-diaper"></use></svg></span>
          <span>Poop</span>
        </button>
      </div>

      <label class="notes-label" for="modalEntryTime">Time</label>
      <input id="modalEntryTime" class="notes-input time-input" type="time" required>

      <div class="milk-amount-field">
        <label class="notes-label" for="modalMilkAmount">Milk amount</label>
        <div class="amount-input-wrap">
          <input id="modalMilkAmount" class="notes-input milk-amount-input" type="number" inputmode="numeric" min="0" max="999" step="1" placeholder="How many">
          <span class="amount-unit" aria-hidden="true">ml</span>
        </div>
      </div>

      <label class="notes-label" for="modalNotes">Optional note</label>
      <input id="modalNotes" class="notes-input" type="text" maxlength="80" placeholder="Short note">

      <div class="modal-actions">
        <button id="deleteEntry" class="modal-button delete-entry" type="button">Delete entry</button>
        <button id="saveEntry" class="modal-button save-entry" type="button">Save</button>
      </div>
    </section>
  </div>

  <script src="script.js?v=2026.06.14.18"></script>
</body>
</html>
